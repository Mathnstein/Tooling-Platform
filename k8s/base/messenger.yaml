apiVersion: apps/v1
kind: Deployment
metadata:
  name: messenger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messenger
  template:
    metadata:
      labels:
        app: messenger
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4.2.5-management-alpine
          envFrom:
            - secretRef:
                name: messenger-credentials
          ports:
            - containerPort: 5672 # AMQP
            - containerPort: 15672 # Management
---
apiVersion: v1
kind: Service
metadata:
  name: messenger-service
spec:
  selector:
    app: messenger
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
