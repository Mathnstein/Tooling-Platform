apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: tooling-platform-gateway:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: messenger-credentials
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000 # This should always match the ../envs/*/.env.gateway PORT value
