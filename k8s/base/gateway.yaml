apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: platform-tooling-gateway:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: MESSENGER_USER
              valueFrom:
                secretKeyRef:
                  name: messenger-credentials
                  key: username
            - name: MESSENGER_PASS
              valueFrom:
                secretKeyRef:
                  name: messenger-credentials
                  key: password
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: platform-tooling-gateway-service
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000 # This should always match the ../envs/.env.gateway PORT value
