apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: tooling-platform-portal:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: portal-service
spec:
  selector:
    app: portal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-ingress
spec:
  rules:
    - http:
        paths:
          # Gateway API Route
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 4000
          # Default Portal Route
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal-service
                port:
                  number: 80
